<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>百灵 Bailin · 对话</title>
    <script src="./shared/theme-init.js"></script>
    <link rel="stylesheet" href="./styles/design-system.css" />
    <style>
      :root {
        --chat-radius: 24px;
        --chat-radius-inner: 16px;
      }

      html,
      body,
      #root {
        background: transparent !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      @keyframes chat-window-morph-in {
        0% {
          transform: scale(0.94);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      #root {
        animation: chat-window-morph-in 220ms cubic-bezier(0.16, 1, 0.3, 1);
        transform-origin: center center;
        border-radius: var(--chat-radius);
        overflow: hidden;
      }

      .chat-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        background: var(--paper);
        border-radius: var(--chat-radius);
        border: 1px solid rgba(31, 58, 58, 0.07);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          0 22px 56px -28px rgba(23, 38, 38, 0.38),
          0 10px 28px -16px rgba(23, 38, 38, 0.14);
      }

      .chat-panel__header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px 12px 18px;
        border-bottom: 1px solid var(--grid);
        -webkit-app-region: drag;
        user-select: none;
        border-top-left-radius: var(--chat-radius);
        border-top-right-radius: var(--chat-radius);
      }

      .chat-panel__header .btn--icon {
        border-radius: 11px;
      }
      .chat-panel__header .btn--icon svg {
        display: block;
      }

      .chat-panel__avatar {
        border-radius: 12px;
        overflow: hidden;
      }

      .chat-panel__body-wrap {
        position: relative;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .chat-panel__body {
        flex: 1;
        overflow: auto;
        padding: 14px 16px;
      }

      .chat-scroll-down {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        padding: 0;
        border-radius: 999px;
        border: 1px solid var(--grid);
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        backdrop-filter: blur(8px);
        box-shadow:
          0 6px 18px -8px rgba(23, 38, 38, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.65);
        color: var(--ink);
        cursor: pointer;
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          background 120ms ease;
      }
      .chat-scroll-down:hover {
        background: var(--paper);
        box-shadow: 0 8px 22px -8px rgba(23, 38, 38, 0.32);
        transform: translateX(-50%) translateY(-1px);
      }
      .chat-scroll-down:active {
        transform: translateX(-50%) translateY(0);
      }

      .chat-panel__footer {
        display: flex;
        gap: 8px;
        padding: 12px 14px;
        border-top: 1px solid var(--grid);
        background: var(--paper-deep);
        align-items: flex-end;
        border-bottom-left-radius: var(--chat-radius);
        border-bottom-right-radius: var(--chat-radius);
      }

      .chat-panel__footer .textarea {
        border-radius: var(--chat-radius-inner);
        min-height: 38px;
        max-height: 120px;
        resize: none;
        overflow-y: hidden;
        padding: 9px 12px;
        font-family: var(--font-body);
        line-height: 1.45;
      }

      .chat-panel__footer .btn {
        border-radius: var(--chat-radius-inner);
      }

      .chat-panel__footer .btn--send,
      .chat-panel__footer .btn--cancel {
        width: 38px;
        min-width: 38px;
        height: 38px;
        padding: 0;
        flex-shrink: 0;
      }

      .chat-panel .suggestion {
        border-radius: var(--chat-radius-inner);
      }

      /* ===== 消息气泡 + 悬浮操作（预留槽位，hover 仅淡入） ===== */
      .chat-row {
        margin: 4px 0 10px;
      }
      .chat-row__stack {
        position: relative;
        display: flex;
        flex-direction: column;
        max-width: 86%;
      }
      .chat-row--user {
        display: flex;
        justify-content: flex-end;
      }
      .chat-row--user .chat-row__stack {
        align-items: flex-end;
      }
      .chat-row--assistant {
        display: flex;
        justify-content: flex-start;
      }
      .chat-row--assistant .chat-row__stack {
        align-items: flex-start;
      }

      /* 时间戳 / 操作栏：始终占位，默认透明，hover 时显示 */
      .chat-row--interactive .chat-row__meta {
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms var(--ease-out);
      }
      .chat-row--interactive:hover .chat-row__meta,
      .chat-row--interactive:focus-within .chat-row__meta {
        opacity: 1;
        pointer-events: auto;
      }

      .chat-row__time {
        flex-shrink: 0;
        min-height: 14px;
        font-size: 11px;
        color: var(--ink-faint);
        line-height: 14px;
        margin-bottom: 4px;
        user-select: none;
      }
      .chat-row__time--user {
        align-self: flex-end;
      }
      .chat-row__time--assistant {
        align-self: flex-start;
      }

      .chat-bubble {
        padding: 9px 13px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .chat-bubble--compact {
        padding: 7px 10px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.45;
      }
      .chat-bubble--user {
        background: var(--ink);
        color: var(--paper);
      }
      .chat-bubble--assistant {
        background: var(--paper-deep);
        color: var(--ink);
        border: 1px solid var(--grid);
        white-space: normal;
      }

      /* 助手消息 Markdown 排版 */
      .chat-md__p {
        margin: 0 0 0.55em;
      }
      .chat-md__p:last-child {
        margin-bottom: 0;
      }
      .chat-md__ol,
      .chat-md__ul {
        margin: 0.2em 0 0.55em;
        padding-left: 1.35em;
      }
      .chat-md__ol:last-child,
      .chat-md__ul:last-child {
        margin-bottom: 0;
      }
      .chat-md__ol {
        list-style-type: decimal;
      }
      .chat-md__ul {
        list-style-type: disc;
      }
      .chat-md li {
        margin: 0.28em 0;
        padding-left: 0.15em;
      }
      .chat-md li::marker {
        color: var(--ink-faint);
        font-weight: 600;
      }
      .chat-md strong {
        font-weight: 650;
        color: var(--ink);
      }
      .chat-bubble--user {
        white-space: pre-wrap;
      }

      .chat-row__actions {
        flex-shrink: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 2px 10px;
        min-height: 22px;
        margin-top: 6px;
      }
      .chat-row__actions--user {
        justify-content: flex-end;
      }
      .chat-row__actions--assistant {
        justify-content: flex-start;
      }

      .chat-row__action {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 0;
        border: none;
        background: transparent;
        color: var(--ink-faint);
        font-family: var(--font-body);
        font-size: 12px;
        cursor: pointer;
        transition: color var(--motion-fast) var(--ease-out);
      }
      .chat-row__action:hover {
        color: var(--ink-soft);
      }
      .chat-row__action:focus-visible {
        color: var(--ink-soft);
        outline: none;
      }
      .chat-row__action-icon {
        display: inline-flex;
        opacity: 0.85;
      }

      /* 历史对话侧栏 */
      .chat-history {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        justify-content: flex-end;
        pointer-events: none;
      }
      .chat-history__backdrop {
        position: absolute;
        inset: 0;
        border: none;
        background: rgba(23, 38, 38, 0.18);
        backdrop-filter: blur(3px);
        pointer-events: auto;
        cursor: default;
      }
      .chat-history__panel {
        position: relative;
        z-index: 1;
        width: min(300px, 88%);
        height: 100%;
        display: flex;
        flex-direction: column;
        background: var(--paper);
        border-left: 1px solid var(--grid);
        box-shadow: -12px 0 32px -20px rgba(23, 38, 38, 0.28);
        pointer-events: auto;
        -webkit-app-region: no-drag;
      }
      .chat-history__new {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 14px 14px 10px;
        padding: 10px 14px;
        border: 1px solid var(--magenta);
        border-radius: 14px;
        background: var(--magenta);
        color: var(--paper);
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 120ms ease,
          border-color 120ms ease,
          color 120ms ease;
      }
      .chat-history__new:hover {
        background: var(--paper-warm);
        border-color: var(--magenta-soft);
        color: var(--magenta-deep);
        transform: translateY(-1px);
      }
      .chat-history__list {
        flex: 1;
        overflow: auto;
        padding: 4px 10px 14px;
      }
      .chat-history__empty {
        padding: 24px 12px;
        text-align: center;
        color: var(--ink-faint);
        font-size: 13px;
      }
      .chat-history__item {
        position: relative;
        display: flex;
        align-items: stretch;
        gap: 4px;
        margin-bottom: 6px;
        border-radius: 14px;
        transition: background 120ms ease;
      }
      .chat-history__item--active {
        background: var(--magenta-tint);
      }
      .chat-history__item:hover:not(:has(.chat-history__rename)) {
        background: var(--paper-deep);
      }
      .chat-history__item-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        padding: 10px 8px 10px 12px;
        border: none;
        background: transparent;
        text-align: left;
        cursor: pointer;
        font-family: var(--font-body);
      }
      .chat-history__item-title {
        width: 100%;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.35;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chat-history__item-meta {
        font-size: 12px;
        color: var(--ink-faint);
      }
      .chat-history__item-actions {
        position: relative;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding-right: 4px;
      }
      .chat-history__menu-btn {
        width: 30px;
        min-width: 30px;
        height: 30px;
        font-size: 16px;
        letter-spacing: 0.02em;
      }
      .chat-history__menu {
        position: absolute;
        top: calc(100% - 4px);
        right: 0;
        z-index: 3;
        min-width: 132px;
        padding: 6px;
        border-radius: 12px;
        border: 1px solid var(--grid);
        background: var(--paper);
        box-shadow: var(--shadow-card);
      }
      .chat-history__menu-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--ink-soft);
        font-family: var(--font-body);
        font-size: 13px;
        cursor: pointer;
        text-align: left;
      }
      .chat-history__menu-item:hover {
        background: var(--paper-deep);
        color: var(--ink);
      }
      .chat-history__menu-item--danger {
        color: var(--magenta);
      }
      .chat-history__menu-item--danger:hover {
        background: var(--magenta-tint);
        color: var(--magenta-deep);
      }
      .chat-history__rename {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        width: 100%;
        padding: 8px 10px;
        -webkit-app-region: no-drag;
      }
      .chat-history__rename-input {
        flex: 1 1 100%;
        min-width: 0;
        -webkit-app-region: no-drag;
        user-select: text;
        cursor: text;
        caret-color: var(--ink);
      }
      .chat-history__rename-input:focus {
        border-color: var(--ink);
      }
    </style>
  </head>
  <body class="grain">
    <div id="root"></div>
    <script type="module" src="./chat/main.tsx"></script>
  </body>
</html>
