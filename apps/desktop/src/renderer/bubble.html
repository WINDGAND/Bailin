<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>百灵 Bailin · 桌宠气泡</title>
    <link rel="stylesheet" href="./styles/design-system.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      /* 桌宠气泡里的滚动条做成隐形细条，避免 Windows Chrome 默认的 vertical 三角 / 占位 */
      textarea::-webkit-scrollbar,
      .pet-bubble-scroll::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      textarea::-webkit-scrollbar-thumb,
      .pet-bubble-scroll::-webkit-scrollbar-thumb {
        background: rgba(15, 23, 23, 0.18);
        border-radius: 3px;
      }
      textarea::-webkit-scrollbar-thumb:hover,
      .pet-bubble-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(15, 23, 23, 0.32);
      }
      textarea::-webkit-scrollbar-track,
      .pet-bubble-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      textarea::-webkit-scrollbar-button {
        display: none;
      }
      /* 气泡 morph 到 ChatWindow 的"放大消散"动画。
         180ms 内 scale 1 → 1.06、opacity 1 → 0；与主进程 ~160ms 后的 hideBubble + showChat 接续，
         视觉上像气泡膨胀变大成聊天窗。 */
      @keyframes pet-bubble-morph-out {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.06);
          opacity: 0;
        }
      }
      .pet-bubble-morph-out {
        animation: pet-bubble-morph-out 180ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./bubble/main.tsx"></script>
  </body>
</html>
