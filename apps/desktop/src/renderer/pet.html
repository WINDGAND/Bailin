<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>百灵 Bailin · 桌宠</title>
    <script src="./shared/theme-init.js"></script>
    <link rel="stylesheet" href="./styles/design-system.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-app-region: no-drag;
      }
      .pet-menu-item:focus {
        outline: none;
      }
      .pet-menu-item:focus-visible {
        background: rgba(178, 24, 88, 0.08);
        outline: 2px solid var(--magenta-soft);
        outline-offset: -2px;
      }
      .pet-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
      }
      .pet-root--menu-left {
        flex-direction: row-reverse;
      }
      .pet-slot {
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        pointer-events: none;
      }
      .pet-menu-backdrop {
        position: fixed;
        inset: 0;
        z-index: 9998;
        pointer-events: auto;
        background: transparent;
      }
      .pet-menu-column {
        position: relative;
        z-index: 9999;
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 2px 0 4px 0;
        margin-left: -56px;
        pointer-events: auto;
      }
      .pet-root--menu-left .pet-menu-column {
        margin-left: 0;
        margin-right: -56px;
        justify-content: flex-end;
      }
      .pet-menu-panel {
        width: 100%;
        max-width: 196px;
        max-height: calc(100vh - 20px);
        overflow-y: auto;
        pointer-events: auto;
        background: var(--paper);
        border: 1px solid var(--grid-strong);
        border-radius: 12px;
        font-family: var(--font-body);
        font-size: 13px;
        color: var(--ink);
      }
      .proactive-bubble {
        position: relative;
        z-index: 10000;
        width: max-content;
        max-width: min(240px, calc(100vw - 16px));
        min-width: 120px;
        padding: 16px 14px 8px;
        background: #ffffff;
        border: 1.5px solid rgba(0, 0, 0, 0.12);
        border-radius: 16px;
        pointer-events: auto;
        flex-shrink: 0;
      }
      .proactive-bubble__close {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: transparent;
        font-family: "Yuanti SC", "YouYuan", "PingFang SC", sans-serif;
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        color: rgba(0, 0, 0, 0.45);
        cursor: pointer;
      }
      .proactive-bubble__close:hover {
        color: #000000;
        background: rgba(0, 0, 0, 0.06);
      }
      .proactive-bubble--show {
        animation: proactive-bubble-in 220ms var(--ease-out, ease-out) both;
      }
      .proactive-bubble__text {
        display: block;
        width: 100%;
        margin: 0;
        padding: 0;
        background: none;
        border: none;
        font-family: "Yuanti SC", "YouYuan", "STYuanti", "PingFang SC", "Microsoft YaHei UI",
          sans-serif;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.5;
        color: #000000;
        text-align: center;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      .proactive-bubble__text:hover {
        opacity: 0.82;
      }
      .proactive-bubble__actions {
        margin-top: 6px;
        display: flex;
        justify-content: center;
      }
      .proactive-bubble__action {
        padding: 2px 4px;
        background: none;
        border: none;
        font-family: "Yuanti SC", "YouYuan", "STYuanti", "PingFang SC", "Microsoft YaHei UI",
          sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: #000000;
        opacity: 0.55;
        cursor: pointer;
      }
      .proactive-bubble__action:hover {
        opacity: 0.85;
      }
      .proactive-bubble__tail {
        position: absolute;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 10px;
        height: 10px;
        background: #ffffff;
      }
      .proactive-bubble--above .proactive-bubble__tail {
        bottom: -6px;
        border-right: 1.5px solid rgba(0, 0, 0, 0.12);
        border-bottom: 1.5px solid rgba(0, 0, 0, 0.12);
      }
      .proactive-bubble--below .proactive-bubble__tail {
        top: -6px;
        border-left: 1.5px solid rgba(0, 0, 0, 0.12);
        border-top: 1.5px solid rgba(0, 0, 0, 0.12);
      }
      .pet-column {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100%;
      }
      .pet-column--bubble-above .pet-bubble-anchor {
        order: 0;
      }
      .pet-column--bubble-above .pet-wrap-zone {
        order: 1;
      }
      .pet-column--bubble-below .pet-bubble-anchor {
        order: 1;
      }
      .pet-column--bubble-below .pet-wrap-zone {
        order: 0;
      }
      .pet-bubble-anchor {
        flex-shrink: 0;
        min-height: var(--bubble-extra, 100px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pet-wrap-zone {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        width: 100%;
        flex-shrink: 0;
        height: var(--pet-zone-height, 260px);
      }
      .pet-root--bubble-below {
        align-items: flex-start;
      }
      .pet-root--bubble-above .pet-column {
        justify-content: flex-end;
      }
      .pet-root--bubble-below .pet-column {
        justify-content: flex-start;
      }
      .pet-wrap-with-bubble {
        position: relative;
      }
      @keyframes proactive-bubble-in {
        from {
          opacity: 0;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./pet/main.tsx"></script>
  </body>
</html>
