<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>百灵 Bailin · 桌宠</title>
    <script src="./shared/theme-init.js"></script>
    <link rel="stylesheet" href="./styles/design-system.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-app-region: no-drag;
      }
      .pet-menu-item:focus {
        outline: none;
      }
      .pet-menu-item:focus-visible {
        background: rgba(178, 24, 88, 0.08);
        outline: 2px solid var(--magenta-soft);
        outline-offset: -2px;
      }
      .pet-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
      }
      .pet-root--menu-left {
        flex-direction: row-reverse;
      }
      .pet-slot {
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        pointer-events: none;
      }
      .pet-menu-backdrop {
        position: fixed;
        inset: 0;
        z-index: 9998;
        pointer-events: auto;
        background: transparent;
      }
      .pet-menu-column {
        position: relative;
        z-index: 9999;
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 2px 0 4px 0;
        margin-left: -56px;
        pointer-events: auto;
      }
      .pet-root--menu-left .pet-menu-column {
        margin-left: 0;
        margin-right: -56px;
        justify-content: flex-end;
      }
      .pet-menu-panel {
        width: 100%;
        max-width: 196px;
        max-height: calc(100vh - 20px);
        overflow-y: auto;
        pointer-events: auto;
        background: var(--paper);
        border: 1px solid var(--grid-strong);
        border-radius: 12px;
        font-family: var(--font-body);
        font-size: 13px;
        color: var(--ink);
      }
      .pet-column {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100%;
        justify-content: flex-end;
      }
      .pet-wrap-zone {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        width: 100%;
        flex-shrink: 0;
        height: 100%;
      }
      .pet-wrap {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./pet/main.tsx"></script>
  </body>
</html>
