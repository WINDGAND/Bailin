<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>百灵 Bailin · 陪伴气泡</title>
    <script src="./shared/theme-init.js"></script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden !important;
        width: 100%;
        height: 100%;
        scrollbar-width: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      .bubble-shell {
        display: flex;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }
      .bubble-shell--above {
        align-items: flex-end;
      }
      .bubble-shell--below {
        align-items: flex-start;
      }
      .proactive-bubble {
        position: relative;
        width: max-content;
        max-width: min(300px, calc(100vw - 16px));
        min-width: 120px;
        padding: 14px 16px 12px;
        background: #ffffff;
        border: 1.5px solid rgba(0, 0, 0, 0.12);
        border-radius: 16px;
        pointer-events: auto;
        box-sizing: border-box;
      }
      .proactive-bubble__close {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: transparent;
        font-family: "Yuanti SC", "YouYuan", "PingFang SC", sans-serif;
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        color: rgba(0, 0, 0, 0.45);
        cursor: pointer;
      }
      .proactive-bubble__close:hover {
        color: #000000;
        background: rgba(0, 0, 0, 0.06);
      }
      .proactive-bubble__text {
        display: block;
        width: 100%;
        margin: 0;
        padding: 0 4px;
        background: none;
        border: none;
        font-family: "Yuanti SC", "YouYuan", "STYuanti", "PingFang SC", "Microsoft YaHei UI",
          sans-serif;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.55;
        color: #000000;
        text-align: center;
        cursor: pointer;
        letter-spacing: 0.02em;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .proactive-bubble__text:hover {
        opacity: 0.82;
      }
      .proactive-bubble__tail {
        position: absolute;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 10px;
        height: 10px;
        background: #ffffff;
      }
      .proactive-bubble--above .proactive-bubble__tail {
        bottom: -6px;
        border-right: 1.5px solid rgba(0, 0, 0, 0.12);
        border-bottom: 1.5px solid rgba(0, 0, 0, 0.12);
      }
      .proactive-bubble--below .proactive-bubble__tail {
        top: -6px;
        border-left: 1.5px solid rgba(0, 0, 0, 0.12);
        border-top: 1.5px solid rgba(0, 0, 0, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./proactive-bubble/main.tsx"></script>
  </body>
</html>
