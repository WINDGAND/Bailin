<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>百灵 Bailin · 陪伴气泡</title>
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <script src="./shared/theme-init.js"></script>
    <link rel="stylesheet" href="./styles/design-system.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden !important;
        width: 100%;
        height: 100%;
        scrollbar-width: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      .bubble-shell {
        display: flex;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }
      .bubble-shell--above {
        align-items: flex-end;
      }
      .bubble-shell--below {
        align-items: flex-start;
      }
      .proactive-bubble {
        position: relative;
        width: max-content;
        max-width: min(300px, calc(100vw - 16px));
        min-width: 120px;
        padding: 14px 16px 12px;
        background: var(--paper);
        border: 1px solid var(--grid-strong);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        pointer-events: auto;
        box-sizing: border-box;
        animation: bubble-appear 200ms var(--ease-out) both;
      }
      @keyframes bubble-appear {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      /* reduced-motion 用户：直接停在 to 状态，不要小幅震入；
         比依赖 design-system.css 全局 animation-duration:0.001ms 兜底更明确。 */
      @media (prefers-reduced-motion: reduce) {
        .proactive-bubble {
          animation: none;
        }
      }
      .proactive-bubble__close {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        height: 22px;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--ink-faint);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background var(--motion-fast) var(--ease-out),
          color var(--motion-fast) var(--ease-out),
          transform var(--motion-fast) var(--ease-spring);
      }
      .proactive-bubble__close:hover {
        /* magenta-tint 比 paper-deep 更清晰地标示 destructive 意图 */
        color: var(--magenta);
        background: var(--magenta-tint);
        transform: scale(1.08);
      }
      .proactive-bubble__close:active {
        transform: scale(0.94);
      }
      .proactive-bubble__close:focus-visible {
        outline: 2px solid var(--magenta-soft);
        outline-offset: 1px;
      }
      .proactive-bubble__text {
        display: block;
        width: 100%;
        margin: 0;
        padding: 0 4px;
        background: none;
        border: none;
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.6;
        color: var(--ink);
        text-align: center;
        cursor: pointer;
        letter-spacing: 0.01em;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        transition: color var(--motion-fast) var(--ease-out);
      }
      .proactive-bubble__text:hover {
        color: var(--magenta);
      }
      .proactive-bubble__text:focus-visible {
        outline: 2px solid var(--magenta-soft);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }
      .proactive-bubble__tail {
        position: absolute;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 10px;
        height: 10px;
        background: var(--paper);
      }
      .proactive-bubble--above .proactive-bubble__tail {
        bottom: -6px;
        border-right: 1px solid var(--grid-strong);
        border-bottom: 1px solid var(--grid-strong);
      }
      .proactive-bubble--below .proactive-bubble__tail {
        top: -6px;
        border-left: 1px solid var(--grid-strong);
        border-top: 1px solid var(--grid-strong);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./proactive-bubble/main.tsx"></script>
  </body>
</html>
